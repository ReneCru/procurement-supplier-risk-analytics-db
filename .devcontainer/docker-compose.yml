version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ../..:/workspaces:cached
    command: sleep infinity
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://procurement_user:procurement_pass@db:5432/procurement_analytics

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: procurement_user
      POSTGRES_PASSWORD: procurement_pass
      POSTGRES_DB: procurement_analytics
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
